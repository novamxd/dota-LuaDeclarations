name: Check for dota-data updates

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # manual trigger

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Check for dota-data update
        id: check
        run: |
          CURRENT=$(node -e "console.log(require('./node_modules/@moddota/dota-data/package.json').version)")
          LATEST=$(npm view @moddota/dota-data version)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Update, build, version bump, commit, tag
        if: steps.check.outputs.updated == 'true'
        run: |
          npm install @moddota/dota-data@latest
          npm run build

          CURRENT_VER=$(node -e "console.log(require('./output/package.json').version)")
          NEW_VER=$(node -e "const v='$CURRENT_VER'.split('.');v[2]=+v[2]+1;console.log(v.join('.'))")
          node scripts/version-bump.js "$NEW_VER"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update @moddota/dota-data ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}"
          git tag "v${NEW_VER}" -m "Auto-release v${NEW_VER}

Updated @moddota/dota-data from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}.
Regenerated dota-api.lua declarations from latest engine data."
          git push origin main --tags
